<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rx Directory — Clinical Drug Reference</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #f5f4f0; --surface: #ffffff; --border: #e2e0d8;
      --border-strong: #c9c6ba; --text-primary: #1a1916;
      --text-secondary: #5c5a53; --text-muted: #9c9a90;
      --accent: #2b5ce6; --accent-light: #eef1fd;
    }
    body { font-family: 'Geist', sans-serif; background: var(--bg); color: var(--text-primary); overflow: hidden; }
    .mono { font-family: 'DM Mono', monospace; }
    .serif { font-family: 'Instrument Serif', serif; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #a09e94; }
    @keyframes shimmer { 0% { background-position: -600px 0; } 100% { background-position: 600px 0; } }
    .skeleton { background: linear-gradient(90deg, #ebe9e3 25%, #f5f3ee 50%, #ebe9e3 75%); background-size: 600px 100%; animation: shimmer 1.6s infinite linear; border-radius: 8px; }
    .drug-card:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
    .drug-card:focus:not(:focus-visible) { outline: none; }
    @keyframes comparePulse { 0%,100% { box-shadow: 0 0 0 0 rgba(43,92,230,0.3); } 50% { box-shadow: 0 0 0 4px rgba(43,92,230,0.1); } }
    .compare-active { animation: comparePulse 2s infinite; }
    @keyframes slideIn { from { opacity:0; transform:translateX(10px); } to { opacity:1; transform:translateX(0); } }
    .slide-in { animation: slideIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.2s ease-out forwards; }
    .modal-backdrop { backdrop-filter: blur(3px); }
    .filter-chip { cursor:pointer; padding:4px 11px; border-radius:999px; font-size:11px; font-weight:600; border:1.5px solid var(--border); background:var(--surface); color:var(--text-secondary); transition:all 0.15s; user-select:none; }
    .filter-chip:hover { border-color:var(--accent); color:var(--accent); }
    .filter-chip.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    .recent-chip { cursor:pointer; display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:500; border:1px solid var(--border); background:var(--surface); color:var(--text-secondary); transition:all 0.12s; }
    .recent-chip:hover { background:var(--accent-light); border-color:var(--accent); color:var(--accent); }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    .compare-col { flex:1; min-width:0; }
    .hdr-btn { display:inline-flex; align-items:center; gap:5px; padding:5px 12px; border-radius:8px; font-size:12px; font-weight:600; border:1.5px solid var(--border); background:var(--surface); color:var(--text-secondary); cursor:pointer; transition:all 0.15s; white-space:nowrap; }
    .hdr-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); }
    .hdr-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const CategoryIcons = {
  default: (c) => (<svg viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>),
  analgesic: (c) => (<svg viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/></svg>),
  antibiotic: (c) => (<svg viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" className="w-4 h-4"><circle cx="12" cy="12" r="3"/><path strokeLinecap="round" strokeLinejoin="round" d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>),
  antihypertensive: (c) => (<svg viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/></svg>),
  antidiabetic: (c) => (<svg viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M9 3.75h6M9 3.75A2.25 2.25 0 006.75 6v13.5A2.25 2.25 0 009 21.75h6a2.25 2.25 0 002.25-2.25V6A2.25 2.25 0 0015 3.75M9 3.75h6M12 9v6m-2-3h4"/></svg>),
  antifungal: (c) => (<svg viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M12 3C7.03 3 3 7.03 3 12s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9z"/><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v8M8 12h8"/></svg>),
  antiviral: (c) => (<svg viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>),
  nsaid: (c) => (<svg viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/></svg>),
  supplement: (c) => (<svg viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>),
  steroid: (c) => (<svg viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/></svg>),
};

function getCategoryIcon(category, color="currentColor") {
  if (!category) return CategoryIcons.default(color);
  const cat = category.toLowerCase();
  if (cat.includes('analgesic') || cat.includes('pain')) return CategoryIcons.analgesic(color);
  if (cat.includes('antibiotic') || cat.includes('antimicrobial')) return CategoryIcons.antibiotic(color);
  if (cat.includes('antihypertensive') || cat.includes('cardiac') || cat.includes('cardio') || cat.includes('blood pressure')) return CategoryIcons.antihypertensive(color);
  if (cat.includes('antidiabetic') || cat.includes('diabetes') || cat.includes('glucose') || cat.includes('insulin')) return CategoryIcons.antidiabetic(color);
  if (cat.includes('antifungal') || cat.includes('fungal')) return CategoryIcons.antifungal(color);
  if (cat.includes('antiviral') || cat.includes('viral')) return CategoryIcons.antiviral(color);
  if (cat.includes('nsaid') || cat.includes('anti-inflammatory')) return CategoryIcons.nsaid(color);
  if (cat.includes('supplement') || cat.includes('vitamin') || cat.includes('mineral')) return CategoryIcons.supplement(color);
  if (cat.includes('steroid') || cat.includes('corticosteroid')) return CategoryIcons.steroid(color);
  return CategoryIcons.default(color);
}

function getSafetyColors(safetyClass) {
  if (!safetyClass) return 'bg-gray-50 border-gray-200 text-gray-500';
  const sc = safetyClass.toUpperCase();
  if (sc.includes('SAFE') || sc.includes('COMPATIBLE')) return 'bg-emerald-50 border-emerald-200 text-emerald-800';
  if (sc.includes('CONTRAINDICATED') || sc.includes('AVOID') || sc.includes('UNSAFE')) return 'bg-red-50 border-red-200 text-red-800';
  if (sc.includes('CAUTION') || sc.includes('MONITOR') || sc.includes('ADJUST') || sc.includes('USE WITH')) return 'bg-amber-50 border-amber-200 text-amber-800';
  return 'bg-slate-50 border-slate-200 text-slate-600';
}

function SkeletonCard() {
  return (
    <div className="p-4 rounded-xl border border-slate-200 bg-white space-y-2.5">
      <div className="skeleton h-3.5 w-3/4" /><div className="skeleton h-3 w-1/2" /><div className="skeleton h-3 w-1/3" />
    </div>
  );
}

function SkeletonDetail() {
  return (
    <div className="max-w-4xl mx-auto p-8 space-y-5 fade-in">
      <div className="bg-white p-6 rounded-2xl border border-slate-200 space-y-3">
        <div className="skeleton h-4 w-24" /><div className="skeleton h-7 w-2/3" />
      </div>
      <div className="grid grid-cols-4 gap-3">{[...Array(4)].map((_,i) => <div key={i} className="skeleton h-28 rounded-xl" />)}</div>
      <div className="skeleton h-20 rounded-xl" /><div className="skeleton h-32 rounded-xl" />
    </div>
  );
}

function DoseCalcModal({ drug, onClose }) {
  const [weight, setWeight] = useState('');
  const [dosePerKg, setDosePerKg] = useState('');
  const [freq, setFreq] = useState('1');

  const result = useMemo(() => {
    const w = parseFloat(weight), d = parseFloat(dosePerKg), f = parseInt(freq);
    if (!w || !d || w <= 0 || d <= 0) return null;
    return { single: (w * d).toFixed(1), daily: (w * d * f).toFixed(1) };
  }, [weight, dosePerKg, freq]);

  useEffect(() => {
    const h = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center modal-backdrop" style={{background:'rgba(26,25,22,0.45)'}} onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 fade-in" onClick={e => e.stopPropagation()}>
        <div className="p-5 border-b border-slate-100 flex items-center justify-between">
          <div>
            <h3 className="text-sm font-bold text-slate-900">Dose Calculator</h3>
            <p className="text-xs text-slate-400 mt-0.5">{drug.Active_Content}</p>
          </div>
          <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-slate-100 text-slate-400 transition-colors">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div className="p-5 space-y-4">
          <div>
            <label className="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Weight (kg)</label>
            <input type="number" value={weight} onChange={e => setWeight(e.target.value)} placeholder="e.g. 70"
              className="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm mono" />
          </div>
          <div>
            <label className="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Dose (mg/kg)</label>
            <input type="number" value={dosePerKg} onChange={e => setDosePerKg(e.target.value)} placeholder="e.g. 10"
              className="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm mono" />
          </div>
          <div>
            <label className="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide">Frequency</label>
            <select value={freq} onChange={e => setFreq(e.target.value)}
              className="w-full px-3.5 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-white">
              {['1','2','3','4','6','8'].map(v => <option key={v} value={v}>{v}× per day</option>)}
            </select>
          </div>
          {result && (
            <div className="bg-blue-50 border border-blue-100 rounded-xl p-4 space-y-2.5 fade-in">
              <div className="flex justify-between items-center">
                <span className="text-xs font-semibold text-blue-500 uppercase tracking-wide">Single dose</span>
                <span className="mono text-lg font-bold text-blue-900">{result.single} <span className="text-xs font-normal text-blue-500">mg</span></span>
              </div>
              <div className="flex justify-between items-center border-t border-blue-200 pt-2.5">
                <span className="text-xs font-semibold text-blue-500 uppercase tracking-wide">Daily total</span>
                <span className="mono text-lg font-bold text-blue-900">{result.daily} <span className="text-xs font-normal text-blue-500">mg/day</span></span>
              </div>
              {drug.Max_Dose_Adult && (
                <p className="text-xs text-blue-500 pt-1.5 border-t border-blue-200">Ref max: <strong>{drug.Max_Dose_Adult}</strong></p>
              )}
            </div>
          )}
          <p className="text-xs text-slate-400 leading-relaxed">Estimates only. Verify against current prescribing guidelines.</p>
        </div>
      </div>
    </div>
  );
}

function ComparePanel({ drugs, onRemove }) {
  const safetyKeys = [
    { key:'Renal_Class', note:'Renal_Note', label:'Renal' },
    { key:'Hepatic_Class', note:'Hepatic_Note', label:'Hepatic' },
    { key:'Pregnancy_Class', note:'Pregnancy_Note', label:'Pregnancy' },
    { key:'Lactation_Class', note:'Lactation_Note', label:'Lactation' },
  ];
  return (
    <div className="fade-in h-full overflow-y-auto">
      <div className="max-w-4xl mx-auto px-8 py-6">
        <div className="flex items-center gap-3 mb-5 pb-4 border-b border-slate-200">
          <div className="flex items-center gap-2 text-blue-700 bg-blue-50 border border-blue-200 px-3 py-1.5 rounded-lg">
            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/></svg>
            <span className="text-xs font-bold">{drugs.length}/3 selected</span>
          </div>
          <p className="text-xs text-slate-400">Use the + button on drug cards (compare mode) to add drugs here</p>
        </div>
        {drugs.length === 0 ? (
          <div className="flex flex-col items-center justify-center py-20 text-slate-400">
            <svg className="w-10 h-10 mb-3 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/></svg>
            <p className="text-sm font-semibold text-slate-500">No drugs selected</p>
            <p className="text-xs mt-1">Enable compare mode, then click + on drug cards</p>
          </div>
        ) : (
          <div className="space-y-3">
            <div className="flex gap-3">
              <div className="w-24 shrink-0" />
              {drugs.map(drug => (
                <div key={drug.Active_Content} className="compare-col bg-white border border-slate-200 rounded-xl p-4 relative">
                  <button onClick={() => onRemove(drug.Active_Content)} className="absolute top-2.5 right-2.5 p-1 rounded hover:bg-red-50 hover:text-red-500 text-slate-300 transition-colors">
                    <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>
                  </button>
                  <p className="text-xs text-slate-400 mb-1">{drug.Category || '—'}</p>
                  <p className="font-bold text-slate-900 text-sm leading-tight pr-5">{drug.Active_Content}</p>
                  {drug["FIRST BRAND"] && <p className="text-xs text-blue-500 font-medium mt-1.5">{drug["FIRST BRAND"]}</p>}
                </div>
              ))}
            </div>
            <div className="flex gap-3">
              <div className="w-24 shrink-0 flex items-start pt-3"><p className="text-xs font-bold text-slate-500 uppercase tracking-wider">Max Dose</p></div>
              {drugs.map(drug => (
                <div key={drug.Active_Content} className="compare-col bg-white border border-slate-200 rounded-xl p-4">
                  <p className="text-sm font-semibold text-blue-900">{drug.Max_Dose_Adult || '—'}</p>
                  {drug.Max_Dose_Notes && <p className="text-xs text-slate-500 mt-1">{drug.Max_Dose_Notes}</p>}
                </div>
              ))}
            </div>
            {safetyKeys.map(({ key, note, label }) => (
              <div key={key} className="flex gap-3">
                <div className="w-24 shrink-0 flex items-start pt-3"><p className="text-xs font-bold text-slate-500 uppercase tracking-wider">{label}</p></div>
                {drugs.map(drug => (
                  <div key={drug.Active_Content} className={`compare-col rounded-xl p-4 border ${getSafetyColors(drug[key])}`}>
                    <p className="font-bold text-sm">{drug[key] || 'N/A'}</p>
                    {drug[note] && <p className="text-xs mt-1.5 opacity-80 leading-relaxed">{drug[note]}</p>}
                  </div>
                ))}
              </div>
            ))}
            <div className="flex gap-3">
              <div className="w-24 shrink-0 flex items-start pt-3"><p className="text-xs font-bold text-slate-500 uppercase tracking-wider">Brands</p></div>
              {drugs.map(drug => (
                <div key={drug.Active_Content} className="compare-col bg-white border border-slate-200 rounded-xl p-4 space-y-1.5">
                  {drug["FIRST BRAND"] && <div className="flex justify-between text-xs"><span className="font-bold text-slate-800">{drug["FIRST BRAND"]}</span>{drug["FIRST PRICE"] && <span className="text-emerald-600 font-bold mono">₹{drug["FIRST PRICE"]} (INR)</span>}</div>}
                  {drug["SECOND BRAND"] && <div className="flex justify-between text-xs"><span className="font-bold text-slate-800">{drug["SECOND BRAND"]}</span>{drug["SECOND PRICE"] && <span className="text-emerald-600 font-bold mono">₹{drug["SECOND PRICE"]} (INR)</span>}</div>}
                  {!drug["FIRST BRAND"] && <p className="text-xs text-slate-400 italic">No brands listed</p>}
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function DrugDetail({ drug, onCalc }) {
  const safetyCards = [
    { key:'Renal_Class', note:'Renal_Note', label:'Renal' },
    { key:'Hepatic_Class', note:'Hepatic_Note', label:'Hepatic' },
    { key:'Pregnancy_Class', note:'Pregnancy_Note', label:'Pregnancy' },
    { key:'Lactation_Class', note:'Lactation_Note', label:'Lactation' },
  ];
  return (
    <div className="max-w-4xl mx-auto px-8 py-6 slide-in">
      {/* Header */}
      <div className="bg-white p-5 rounded-2xl border border-slate-200 mb-5">
        <div className="flex items-start justify-between gap-4">
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2 mb-2.5">
              <div className="w-7 h-7 rounded-lg flex items-center justify-center shrink-0" style={{background:'#eef1fd'}}>
                {getCategoryIcon(drug.Category, '#2b5ce6')}
              </div>
              <span className="px-2.5 py-0.5 bg-slate-100 text-slate-500 border border-slate-200 rounded-lg text-xs font-bold tracking-widest uppercase">
                {drug.Category || 'General'}
              </span>
            </div>
            <h1 className="text-xl font-extrabold text-slate-900 tracking-tight leading-tight break-words">{drug.Active_Content}</h1>
            {(drug["FIRST BRAND"] || drug["SECOND BRAND"]) && (
              <p className="text-xs text-slate-400 mt-1">Brands: <span className="font-semibold text-blue-600">{[drug["FIRST BRAND"], drug["SECOND BRAND"]].filter(Boolean).join(', ')}</span></p>
            )}
          </div>
          <button onClick={onCalc} className="shrink-0 flex items-center gap-1.5 px-3 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-xs font-bold transition-colors">
            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 13h.01M13 13h.01M13 17h.01M17 13h.01M17 17h.01M5 3h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/></svg>
            Dose Calc
          </button>
        </div>
      </div>

      {/* Safety */}
      <div className="mb-5">
        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2.5">Safety Profile</p>
        <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
          {safetyCards.map(({ key, note, label }) => (
            <div key={key} className={`p-4 rounded-xl border ${getSafetyColors(drug[key])}`}>
              <p className="text-xs font-bold uppercase tracking-wider opacity-60 mb-1">{label}</p>
              <p className="text-sm font-extrabold leading-snug">{drug[key] || "N/A"}</p>
              <p className="text-xs mt-2 opacity-75 leading-relaxed break-words">{drug[note] || "No notes available."}</p>
            </div>
          ))}
        </div>
      </div>

      {/* Max Dose */}
      <div className="mb-5 bg-blue-50 px-5 py-4 rounded-xl border border-blue-100">
        <p className="text-xs font-bold text-blue-400 uppercase tracking-wider mb-1">Maximum Adult Dosing</p>
        <p className="text-sm font-bold text-blue-900 break-words">{drug.Max_Dose_Adult || "Not specified."}</p>
        {drug.Max_Dose_Notes && <p className="text-xs text-blue-600 mt-2 pt-2 border-t border-blue-200 leading-relaxed break-words">{drug.Max_Dose_Notes}</p>}
      </div>

      {/* Brands */}
      <div>
        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2.5">Available Brands & Pricing</p>
        <div className="bg-white border border-slate-200 rounded-xl overflow-hidden">
          <table className="w-full text-left text-xs">
            <thead className="bg-slate-50 border-b border-slate-200">
              <tr>
                <th className="px-5 py-3 font-bold text-slate-500 uppercase tracking-wider">Brand</th>
                <th className="px-5 py-3 font-bold text-slate-500 uppercase tracking-wider">Manufacturer</th>
                <th className="px-5 py-3 font-bold text-slate-500 uppercase tracking-wider text-right">Price (INR)</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {drug["FIRST BRAND"] && (
                <tr className="hover:bg-slate-50 transition-colors">
                  <td className="px-5 py-3.5 font-bold text-slate-900">{drug["FIRST BRAND"]}</td>
                  <td className="px-5 py-3.5 text-slate-500">{drug["FIRST MFG"] || '—'}</td>
                  <td className="px-5 py-3.5 text-right font-bold text-emerald-600 mono">{drug["FIRST PRICE"] ? `₹${drug["FIRST PRICE"]}` : '—'}</td>
                </tr>
              )}
              {drug["SECOND BRAND"] && (
                <tr className="hover:bg-slate-50 transition-colors">
                  <td className="px-5 py-3.5 font-bold text-slate-900">{drug["SECOND BRAND"]}</td>
                  <td className="px-5 py-3.5 text-slate-500">{drug["SECOND MFG"] || '—'}</td>
                  <td className="px-5 py-3.5 text-right font-bold text-emerald-600 mono">{drug["SECOND PRICE"] ? `₹${drug["SECOND PRICE"]}` : '—'}</td>
                </tr>
              )}
              {!drug["FIRST BRAND"] && !drug["SECOND BRAND"] && (
                <tr><td colSpan="3" className="px-5 py-8 text-center text-slate-400 italic">No pricing information available.</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
      <div className="h-10" />
    </div>
  );
}

function DrugDirectory() {
  const [searchTerm, setSearchTerm] = useState('');
  const [drugsData, setDrugsData] = useState([]);
  const [selectedDrug, setSelectedDrug] = useState(null);
  const [isLoading, setIsLoading] = useState(false);
  const [recentSearches, setRecentSearches] = useState([]);
  const [compareList, setCompareList] = useState([]);
  const [compareMode, setCompareMode] = useState(false);
  const [showCalc, setShowCalc] = useState(false);
  const [categoryFilter, setCategoryFilter] = useState('');
  const [safetyFilter, setSafetyFilter] = useState('');
  const [showFilters, setShowFilters] = useState(false);
  const [focusedIndex, setFocusedIndex] = useState(-1);
  const listRef = useRef(null);
  const inputRef = useRef(null);
  const cardRefs = useRef([]);

  useEffect(() => {
    if (searchTerm.trim().length < 2) { setDrugsData([]); setIsLoading(false); return; }
    setIsLoading(true);
    const t = setTimeout(() => {
      fetch(`https://drugs.drmjp93.workers.dev?q=${encodeURIComponent(searchTerm)}`)
        .then(r => r.json())
        .then(data => {
          const arr = Array.isArray(data) ? data : [];
          setDrugsData(arr);
          if (arr.length > 0 && !selectedDrug) setSelectedDrug(arr[0]);
          setIsLoading(false);
          setRecentSearches(prev => [searchTerm.trim(), ...prev.filter(s => s !== searchTerm.trim())].slice(0, 6));
        })
        .catch(() => setIsLoading(false));
    }, 300);
    return () => clearTimeout(t);
  }, [searchTerm]);

  const filteredDrugs = useMemo(() => {
    return drugsData.filter(drug => {
      if (categoryFilter && drug.Category !== categoryFilter) return false;
      if (safetyFilter) {
        const pc = (drug.Pregnancy_Class || '').toUpperCase();
        if (safetyFilter === 'safe' && !(pc.includes('SAFE') || pc.includes('COMPATIBLE'))) return false;
        if (safetyFilter === 'caution' && !(pc.includes('CAUTION') || pc.includes('MONITOR') || pc.includes('ADJUST'))) return false;
        if (safetyFilter === 'danger' && !(pc.includes('CONTRAINDICATED') || pc.includes('AVOID') || pc.includes('UNSAFE'))) return false;
      }
      return true;
    });
  }, [drugsData, categoryFilter, safetyFilter]);

  const categories = useMemo(() => [...new Set(drugsData.map(d => d.Category).filter(Boolean))].sort(), [drugsData]);

  useEffect(() => {
    const h = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
      if (e.key === '/' || e.key === 'f') { e.preventDefault(); inputRef.current?.focus(); }
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  const toggleCompare = (drug) => {
    setCompareList(prev => {
      if (prev.find(d => d.Active_Content === drug.Active_Content)) return prev.filter(d => d.Active_Content !== drug.Active_Content);
      if (prev.length >= 3) return prev;
      return [...prev, drug];
    });
  };

  const inCompare = (drug) => compareList.some(d => d.Active_Content === drug.Active_Content);
  const clearSearch = () => { setSearchTerm(''); setDrugsData([]); setSelectedDrug(null); setCategoryFilter(''); setSafetyFilter(''); inputRef.current?.focus(); };

  return (
    <div className="flex flex-col h-screen w-full overflow-hidden" style={{background:'var(--bg)'}}>
      {/* Top bar — disclaimer left, action buttons right, no z-index clash */}
      <div className="flex items-center justify-between px-5 py-2.5 bg-white border-b border-slate-200 shrink-0 gap-6" style={{zIndex:10, position:'relative'}}>
        <div className="flex items-center gap-2 text-xs text-amber-700 min-w-0">
          <svg className="w-3.5 h-3.5 shrink-0 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
          <span className="truncate text-amber-700"><strong>Clinical reference only.</strong> For qualified healthcare professionals. Not a substitute for clinical judgment or current prescribing information.</span>
        </div>
        <div className="flex items-center gap-2 shrink-0">
          <button onClick={() => setCompareMode(m => !m)} className={`hdr-btn ${compareMode ? 'active' : ''}`}>
            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/></svg>
            {compareMode ? `Compare (${compareList.length}/3)` : 'Compare'}
          </button>
          <button onClick={() => setShowFilters(f => !f)} className={`hdr-btn ${showFilters || categoryFilter || safetyFilter ? 'active' : ''}`}>
            <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
            {categoryFilter || safetyFilter ? 'Filters ●' : 'Filters'}
          </button>
        </div>
      </div>

      <div className="flex flex-1 overflow-hidden">
        {/* LEFT PANE */}
        <section className="w-[400px] shrink-0 bg-white border-r flex flex-col" style={{borderColor:'var(--border)'}}>
          <div className="px-4 pt-4 pb-3 border-b shrink-0" style={{borderColor:'var(--border)'}}>
            <div className="flex items-center justify-between mb-3">
              <h2 className="text-base font-extrabold tracking-tight">Rx <span className="serif italic text-blue-600">Directory</span></h2>
            </div>
            <div className="relative">
              <input
                ref={inputRef} type="text" placeholder="Search drug, brand, category…"
                className="w-full py-2.5 pl-9 pr-8 text-sm border rounded-xl outline-none transition-all"
                style={{borderColor: searchTerm ? 'var(--accent)' : 'var(--border)', boxShadow: searchTerm ? '0 0 0 3px #eef1fd' : 'none'}}
                value={searchTerm}
                onChange={e => { setSearchTerm(e.target.value); setFocusedIndex(-1); }}
                onKeyDown={e => { if (e.key === 'ArrowDown' && filteredDrugs.length > 0) { e.preventDefault(); setFocusedIndex(0); cardRefs.current[0]?.focus(); } }}
              />
              <svg className="w-4 h-4 absolute left-3 top-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              {searchTerm && (
                <button onClick={clearSearch} className="absolute right-2.5 top-2.5 p-0.5 rounded-full hover:bg-slate-200 text-slate-400 transition-colors">
                  <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
              )}
            </div>
            <p className="text-xs mt-1.5 px-0.5" style={{color:'var(--text-muted)'}}>
              <kbd className="mono px-1 py-0.5 bg-slate-100 rounded text-xs border border-slate-200">↑↓</kbd> navigate &nbsp;
              <kbd className="mono px-1 py-0.5 bg-slate-100 rounded text-xs border border-slate-200">Enter</kbd> select &nbsp;
              <kbd className="mono px-1 py-0.5 bg-slate-100 rounded text-xs border border-slate-200">/</kbd> focus
            </p>
          </div>

          {/* Filters */}
          {showFilters && (
            <div className="px-4 py-3 border-b bg-slate-50 space-y-3 shrink-0 fade-in" style={{borderColor:'var(--border)'}}>
              {categories.length > 0 && (
                <div>
                  <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Category</p>
                  <div className="flex flex-wrap gap-1.5">
                    <span className={`filter-chip ${categoryFilter === '' ? 'active' : ''}`} onClick={() => setCategoryFilter('')}>All</span>
                    {categories.map(cat => <span key={cat} className={`filter-chip ${categoryFilter === cat ? 'active' : ''}`} onClick={() => setCategoryFilter(c => c === cat ? '' : cat)}>{cat}</span>)}
                  </div>
                </div>
              )}
              <div>
                <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-0.5">Pregnancy Safety</p>
                <p className="text-xs text-slate-400 mb-2">Filter drugs by their pregnancy classification</p>
                <div className="flex flex-wrap gap-1.5">
                  {[['', 'All'], ['safe', '✓ Safe'], ['caution', '⚠ Caution'], ['danger', '✕ Contraindicated']].map(([val, label]) => (
                    <span key={val} className={`filter-chip ${safetyFilter === val ? 'active' : ''}`} onClick={() => setSafetyFilter(s => s === val ? '' : val)}>{label}</span>
                  ))}
                </div>
              </div>
              {(categoryFilter || safetyFilter) && (
                <button onClick={() => { setCategoryFilter(''); setSafetyFilter(''); }} className="text-xs text-blue-500 font-semibold hover:underline">Clear all filters</button>
              )}
            </div>
          )}

          {compareMode && (
            <div className="px-4 py-2 border-b bg-blue-50 flex items-center justify-between shrink-0" style={{borderColor:'#bfdbfe'}}>
              <p className="text-xs font-bold text-blue-600">{compareList.length}/3 in compare</p>
              {compareList.length > 0 && <button onClick={() => setCompareList([])} className="text-xs text-blue-400 hover:text-blue-600 font-semibold">Clear</button>}
            </div>
          )}

          {/* Drug list */}
          <div ref={listRef} className="flex-1 overflow-y-auto px-3 py-3 space-y-1.5">
            {isLoading && [...Array(5)].map((_, i) => <SkeletonCard key={i} />)}

            {!isLoading && searchTerm.length < 2 && (
              <div className="py-8 px-2">
                <div className="flex flex-col items-center mb-6 text-center">
                  <div className="w-11 h-11 rounded-xl flex items-center justify-center mb-3" style={{background:'#eef1fd'}}>
                    <svg className="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
                  </div>
                  <h3 className="text-sm font-bold text-slate-700">Search the drug database</h3>
                  <p className="text-xs text-slate-400 mt-1">Type at least 2 characters to begin</p>
                </div>
                {recentSearches.length > 0 && (
                  <div>
                    <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Recent searches</p>
                    <div className="flex flex-wrap gap-1.5">
                      {recentSearches.map(term => (
                        <button key={term} className="recent-chip" onClick={() => setSearchTerm(term)}>
                          <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                          {term}
                        </button>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {!isLoading && searchTerm.length >= 2 && filteredDrugs.length === 0 && (
              <div className="text-center py-14 px-4">
                <p className="text-sm font-semibold text-slate-600">No results for "{searchTerm}"</p>
                <p className="text-xs text-slate-400 mt-1">Try a broader term or clear filters</p>
                {(categoryFilter || safetyFilter) && <button onClick={() => { setCategoryFilter(''); setSafetyFilter(''); }} className="mt-2 text-xs text-blue-500 font-semibold hover:underline">Clear filters</button>}
              </div>
            )}

            {!isLoading && filteredDrugs.map((drug, index) => {
              const brands = [drug["FIRST BRAND"], drug["SECOND BRAND"]].filter(Boolean).join(" · ");
              const isSelected = selectedDrug?.Active_Content === drug.Active_Content;
              const isInCompare = inCompare(drug);
              return (
                <div
                  key={drug.id || index}
                  ref={el => cardRefs.current[index] = el}
                  tabIndex={0}
                  className={`drug-card p-3.5 rounded-xl cursor-pointer transition-all duration-150 border group relative ${isSelected ? 'bg-blue-50 border-blue-300 shadow-sm' : 'bg-white border-slate-200 hover:border-blue-300 hover:shadow-sm'} ${isInCompare ? 'compare-active ring-2 ring-blue-400 ring-offset-1' : ''}`}
                  onClick={() => setSelectedDrug(drug)}
                  onKeyDown={e => {
                    if (e.key === 'ArrowDown') { e.preventDefault(); const next = index+1; if (cardRefs.current[next]) { setFocusedIndex(next); cardRefs.current[next].focus(); } }
                    if (e.key === 'ArrowUp') { e.preventDefault(); if (index===0) { inputRef.current?.focus(); setFocusedIndex(-1); } else { const prev=index-1; setFocusedIndex(prev); cardRefs.current[prev]?.focus(); } }
                    if (e.key === 'Enter') setSelectedDrug(drug);
                  }}
                >
                  <div className="flex items-center gap-3">
                    <div className={`w-7 h-7 rounded-lg flex items-center justify-center shrink-0 transition-colors ${isSelected ? 'bg-blue-100' : 'bg-slate-50 group-hover:bg-blue-50'}`}>
                      {getCategoryIcon(drug.Category, isSelected ? '#2b5ce6' : '#94a3b8')}
                    </div>
                    <div className="flex-1 min-w-0">
                      <h3 className="font-bold text-sm leading-snug break-words text-slate-900">{drug.Active_Content}</h3>
                      {brands && <p className="text-xs text-blue-500 font-medium mt-0.5 truncate">{brands}</p>}
                      <p className="text-xs text-slate-400 truncate">{drug.Category || 'Uncategorized'}</p>
                    </div>
                    {compareMode && (
                      <button
                        onClick={e => { e.stopPropagation(); toggleCompare(drug); }}
                        className={`shrink-0 p-1.5 rounded-lg transition-colors ${isInCompare ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-400 hover:bg-blue-100 hover:text-blue-600'}`}
                        title={isInCompare ? 'Remove from compare' : 'Add to compare'}
                      >
                        <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          {isInCompare ? <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"/> : <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"/>}
                        </svg>
                      </button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {!isLoading && filteredDrugs.length > 0 && (
            <div className="px-4 py-2 border-t text-xs text-slate-400 shrink-0" style={{borderColor:'var(--border)'}}>
              {filteredDrugs.length} result{filteredDrugs.length !== 1 ? 's' : ''}
              {(categoryFilter || safetyFilter) && <span className="text-blue-500"> · filtered</span>}
            </div>
          )}
        </section>

        {/* RIGHT PANE */}
        <main className="flex-1 overflow-y-auto relative bg-slate-50">
          {compareMode ? (
            <ComparePanel drugs={compareList} onRemove={(name) => setCompareList(prev => prev.filter(d => d.Active_Content !== name))} />
          ) : selectedDrug ? (
            <DrugDetail key={selectedDrug.Active_Content} drug={selectedDrug} onCalc={() => setShowCalc(true)} />
          ) : isLoading ? (
            <SkeletonDetail />
          ) : (
            <div className="flex flex-col h-full items-center justify-center text-slate-400 p-8 text-center">
              <div className="w-14 h-14 rounded-2xl flex items-center justify-center mb-4" style={{background:'#eef1fd'}}>
                <svg className="w-7 h-7 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
              </div>
              <p className="text-sm font-bold text-slate-500">Select a drug to view details</p>
              <p className="text-xs mt-1 text-slate-400">Safety, dosing, and pricing appear here.</p>
            </div>
          )}
        </main>
      </div>

      {showCalc && selectedDrug && <DoseCalcModal drug={selectedDrug} onClose={() => setShowCalc(false)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<DrugDirectory />);
</script>
</body>
</html>
