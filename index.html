<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drug Directory Dashboard</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
   const { useState, useEffect } = React;

    function DrugDirectory() {
      const [searchTerm, setSearchTerm] = useState('');
      const [drugsData, setDrugsData] = useState([]);
      const [selectedDrug, setSelectedDrug] = useState(null);
      const [isLoading, setIsLoading] = useState(false);

      // Listen to the search bar and fetch from Cloudflare dynamically
      useEffect(() => {
        // 1. Backend rule: If less than 2 characters, do nothing and clear the list.
        if (searchTerm.trim().length < 2) {
          setDrugsData([]);
          setIsLoading(false);
          return;
        }

        // 2. Wait 300ms after the user stops typing before fetching (saves bandwidth)
        const delayDebounceFn = setTimeout(() => {
          setIsLoading(true);
          
          // REPLACE THIS WITH YOUR ACTUAL CLOUDFLARE WORKER URL
          const baseUrl = "https://drugs.drmjp93.workers.dev";
          const fetchUrl = `${baseUrl}?q=${encodeURIComponent(searchTerm)}`;

          fetch(fetchUrl)
            .then(response => response.json())
            .then(data => {
              // Ensure we are working with an array
              const actualArray = Array.isArray(data) ? data : [];
              setDrugsData(actualArray);
              
              // Only auto-select if we aren't currently viewing a drug, or if the list updated
              if (actualArray.length > 0 && !selectedDrug) {
                setSelectedDrug(actualArray[0]);
              }
              setIsLoading(false);
            })
            .catch(error => {
              console.error("Fetch error:", error);
              setIsLoading(false);
            });
        }, 300);

        return () => clearTimeout(delayDebounceFn);
      }, [searchTerm]);

      const getBadgeColors = (safetyClass) => {
        if (!safetyClass) return 'bg-gray-50 border-gray-200 text-gray-900';
        const sc = safetyClass.toUpperCase();
        if (sc === 'SAFE') return 'bg-emerald-50 border-emerald-200 text-emerald-900';
        if (sc === 'CAUTION') return 'bg-amber-50 border-amber-200 text-amber-900';
        return 'bg-gray-50 border-gray-200 text-gray-900';
      };

      return (
        <div className="flex h-screen w-full bg-gray-50 overflow-hidden font-sans text-gray-800">
          
          {/* LEFT PANE (Filters - Note: These now only filter the 15 visible results) */}
          <aside className="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm z-10 hidden md:flex">
            <div className="p-4 border-b border-gray-100">
              <h2 className="font-bold text-lg text-gray-900">Filters</h2>
              <p className="text-xs text-gray-500 mt-1">Filters apply to current search results.</p>
            </div>
            <div className="p-4 flex-1 overflow-y-auto space-y-6 opacity-50 cursor-not-allowed">
               <p className="text-sm text-gray-400 italic">Filters disabled in autocomplete mode.</p>
            </div>
          </aside>

          {/* MIDDLE PANE (Search & List) */}
          <section className="w-96 bg-gray-50 border-r border-gray-200 flex flex-col z-0">
            <div className="p-4 bg-white border-b border-gray-200 sticky top-0 shadow-sm z-10">
              <input 
                type="text" 
                placeholder="Type at least 2 letters to search..." 
                className="w-full p-2.5 text-sm border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500"
                value={searchTerm}
                onChange={(e) => setSearchTerm(e.target.value)}
              />
            </div>
            
            <div className="flex-1 overflow-y-auto p-3 space-y-2 relative">
              {isLoading && (
                <div className="absolute top-4 left-0 right-0 text-center text-sm text-blue-500 font-medium animate-pulse">
                  Searching database...
                </div>
              )}

              {!isLoading && searchTerm.length < 2 && (
                <div className="text-center text-sm text-gray-400 mt-10">
                  Search for a drug or category to begin.
                </div>
              )}

              {!isLoading && searchTerm.length >= 2 && drugsData.length === 0 && (
                <div className="text-center text-sm text-gray-400 mt-10">
                  No drugs found for "{searchTerm}".
                </div>
              )}

              {!isLoading && drugsData.map((drug, index) => (
                <div 
                  key={drug.id || index}
                  onClick={() => setSelectedDrug(drug)}
                  className={`p-4 rounded-lg cursor-pointer transition-all duration-150 border ${
                    selectedDrug && selectedDrug.Active_Content === drug.Active_Content 
                      ? 'bg-blue-50 border-blue-400 shadow-sm' 
                      : 'bg-white border-gray-200 hover:border-blue-300'
                  }`}
                >
                  <h3 className="font-semibold text-sm text-gray-900 leading-tight">{drug.Active_Content}</h3>
                  <p className="text-xs text-gray-500 mt-1 truncate">{drug.Category}</p>
                </div>
              ))}
            </div>
          </section>

          {/* RIGHT PANE (Details) */}
          <main className="flex-1 bg-white overflow-y-auto relative">
            {selectedDrug ? (
              <div className="max-w-4xl mx-auto p-8 lg:p-12">
                
                <div className="mb-8">
                  <h1 className="text-3xl font-bold text-gray-900 tracking-tight">{selectedDrug.Active_Content}</h1>
                  <span className="inline-block mt-3 px-3 py-1 bg-gray-100 text-gray-700 border border-gray-200 rounded-full text-xs font-semibold tracking-wide">
                    {selectedDrug.Category}
                  </span>
                </div>

                <div className="mb-10">
                  <h2 className="text-lg font-bold text-gray-900 mb-4 border-b pb-2">Safety Profile</h2>
                  <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                    <div className={`p-4 rounded-xl border ${getBadgeColors(selectedDrug.Renal_Class)}`}>
                      <p className="text-xs font-bold uppercase tracking-wider opacity-70">Renal</p>
                      <p className="text-lg font-bold mt-1">{selectedDrug.Renal_Class || "N/A"}</p>
                      <p className="text-sm mt-2 opacity-90 leading-snug">{selectedDrug.Renal_Note || "No notes available."}</p>
                    </div>
                    <div className={`p-4 rounded-xl border ${getBadgeColors(selectedDrug.Hepatic_Class)}`}>
                      <p className="text-xs font-bold uppercase tracking-wider opacity-70">Hepatic</p>
                      <p className="text-lg font-bold mt-1">{selectedDrug.Hepatic_Class || "N/A"}</p>
                      <p className="text-sm mt-2 opacity-90 leading-snug">{selectedDrug.Hepatic_Note || "No notes available."}</p>
                    </div>
                    <div className={`p-4 rounded-xl border ${getBadgeColors(selectedDrug.Pregnancy_Class)}`}>
                      <p className="text-xs font-bold uppercase tracking-wider opacity-70">Pregnancy</p>
                      <p className="text-lg font-bold mt-1">{selectedDrug.Pregnancy_Class || "N/A"}</p>
                      <p className="text-sm mt-2 opacity-90 leading-snug">{selectedDrug.Pregnancy_Note || "No notes available."}</p>
                    </div>
                    <div className={`p-4 rounded-xl border ${getBadgeColors(selectedDrug.Lactation_Class)}`}>
                      <p className="text-xs font-bold uppercase tracking-wider opacity-70">Lactation</p>
                      <p className="text-lg font-bold mt-1">{selectedDrug.Lactation_Class || "N/A"}</p>
                      <p className="text-sm mt-2 opacity-90 leading-snug">{selectedDrug.Lactation_Note || "No notes available."}</p>
                    </div>
                  </div>
                </div>

                <div className="mb-10 bg-blue-50/50 p-6 rounded-xl border border-blue-100">
                  <h2 className="text-lg font-bold text-gray-900 mb-2">Maximum Adult Dosing</h2>
                  <p className="text-blue-900 font-medium">{selectedDrug.Max_Dose_Adult || "Not specified."}</p>
                  {selectedDrug.Max_Dose_Notes && (
                    <p className="text-sm text-blue-700 mt-2">{selectedDrug.Max_Dose_Notes}</p>
                  )}
                </div>

                <div>
                  <h2 className="text-lg font-bold text-gray-900 mb-4 border-b pb-2">Available Brands & Pricing</h2>
                  <div className="bg-white border border-gray-200 rounded-lg overflow-hidden shadow-sm">
                    <table className="w-full text-left text-sm text-gray-600">
                      <thead className="bg-gray-50 border-b border-gray-200">
                        <tr>
                          <th className="p-4 font-semibold text-gray-700">Brand Name</th>
                          <th className="p-4 font-semibold text-gray-700">Manufacturer</th>
                          <th className="p-4 font-semibold text-gray-700 text-right">Price</th>
                        </tr>
                      </thead>
                        <tbody className="divide-y divide-gray-200">
                        {selectedDrug["FIRST BRAND"] ? (
                          <tr className="hover:bg-gray-50">
                            <td className="p-4 font-bold text-gray-900">{selectedDrug["FIRST BRAND"]}</td>
                            <td className="p-4">{selectedDrug["FIRST MFG"]}</td>
                            <td className="p-4 text-right font-semibold text-emerald-600">
                              {selectedDrug["FIRST PRICE"] ? `${selectedDrug["FIRST PRICE"]} (INR)` : '-'}
                            </td>
                          </tr>
                        ) : null}
                        {selectedDrug["SECOND BRAND"] ? (
                          <tr className="hover:bg-gray-50">
                            <td className="p-4 font-bold text-gray-900">{selectedDrug["SECOND BRAND"]}</td>
                            <td className="p-4">{selectedDrug["SECOND MFG"]}</td>
                            <td className="p-4 text-right font-semibold text-emerald-600">
                              {selectedDrug["SECOND PRICE"] ? `${selectedDrug["SECOND PRICE"]} (INR)` : '-'}
                            </td>
                          </tr>
                        ) : null}
                        {!selectedDrug["FIRST BRAND"] && !selectedDrug["SECOND BRAND"] && (
                            <tr>
                                <td colSpan="3" className="p-4 text-center text-gray-400 italic">No pricing information available.</td>
                            </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>

              </div>
            ) : (
                <div className="flex h-full items-center justify-center text-gray-400">
                    Select a drug from the search results to view details.
                </div>
            )}
          </main>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DrugDirectory />);

  </script>
</body>
</html>
