<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Drug Directory</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Custom scrollbar for a more polished look */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function DrugDirectory() {
      const [searchTerm, setSearchTerm] = useState('');
      const [drugsData, setDrugsData] = useState([]);
      const [selectedDrug, setSelectedDrug] = useState(null);
      const [isLoading, setIsLoading] = useState(false);

      useEffect(() => {
        if (searchTerm.trim().length < 2) {
          setDrugsData([]);
          setIsLoading(false);
          return;
        }

        const delayDebounceFn = setTimeout(() => {
          setIsLoading(true);
          const baseUrl = "https://drugs.drmjp93.workers.dev";
          const fetchUrl = `${baseUrl}?q=${encodeURIComponent(searchTerm)}`;

          fetch(fetchUrl)
            .then(response => response.json())
            .then(data => {
              const actualArray = Array.isArray(data) ? data : [];
              setDrugsData(actualArray);
              
              if (actualArray.length > 0 && !selectedDrug) {
                setSelectedDrug(actualArray[0]);
              }
              setIsLoading(false);
            })
            .catch(error => {
              console.error("Fetch error:", error);
              setIsLoading(false);
            });
        }, 300);

        return () => clearTimeout(delayDebounceFn);
      }, [searchTerm]);

      // Robust color coding that catches more variations and text inconsistencies
      const getBadgeColors = (safetyClass) => {
        if (!safetyClass) return 'bg-slate-50 border-slate-200 text-slate-500';
        
        const sc = safetyClass.toUpperCase().trim();
        
        if (sc.includes('SAFE') || sc.includes('COMPATIBLE')) {
          return 'bg-emerald-50 border-emerald-200 text-emerald-800';
        }
        if (sc.includes('CAUTION') || sc.includes('MONITOR') || sc.includes('ADJUST')) {
          return 'bg-amber-50 border-amber-200 text-amber-800';
        }
        if (sc.includes('CONTRAINDICATED') || sc.includes('AVOID') || sc.includes('UNSAFE')) {
          return 'bg-rose-50 border-rose-200 text-rose-800';
        }
        
        // Default for unknown or other text
        return 'bg-slate-50 border-slate-200 text-slate-700';
      };

      return (
        <div className="flex h-screen w-full bg-slate-100 overflow-hidden font-sans text-slate-800">
          
          {/* LEFT PANE: Search & List (Expanded width, removed filter pane) */}
          <section className="w-full md:w-[400px] lg:w-[480px] bg-white border-r border-slate-200 flex flex-col z-10 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
            
            {/* Sticky Search Header */}
            <div className="p-5 bg-white border-b border-slate-200 sticky top-0 z-20">
              <h2 className="text-xl font-bold text-slate-900 mb-4 tracking-tight">Drug Directory</h2>
              <div className="relative">
                <input 
                  type="text" 
                  placeholder="Search by drug, brand, or category..." 
                  className="w-full p-3.5 pl-10 text-base border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all shadow-sm"
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                />
                {/* Search Icon SVG */}
                <svg className="w-5 h-5 absolute left-3.5 top-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
              </div>
              <p className="text-xs text-slate-500 mt-2 px-1">Type at least 2 letters (e.g., "Analgesic" or "Dolo")</p>
            </div>
            
            {/* Results List */}
            <div className="flex-1 overflow-y-auto p-4 space-y-3">
              {isLoading && (
                <div className="text-center py-10">
                  <div className="inline-block w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mb-2"></div>
                  <p className="text-sm text-blue-600 font-medium">Searching database...</p>
                </div>
              )}

              {!isLoading && searchTerm.length < 2 && (
                <div className="text-center py-16 px-6">
                  <div className="bg-slate-50 rounded-full w-16 h-16 flex items-center justify-center mx-auto mb-4">
                    <svg className="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                  </div>
                  <h3 className="text-base font-semibold text-slate-700">Ready to search</h3>
                  <p className="text-sm text-slate-500 mt-1">Look up medications by active content, brand name, or therapeutic use.</p>
                </div>
              )}

              {!isLoading && searchTerm.length >= 2 && drugsData.length === 0 && (
                <div className="text-center py-16 px-6">
                  <p className="text-base text-slate-600 font-medium">No results found for "{searchTerm}"</p>
                  <p className="text-sm text-slate-500 mt-1">Check the spelling or try a broader category.</p>
                </div>
              )}

{!isLoading && drugsData.map((drug, index) => {
                // Combine the brands into a single string, ignoring empty ones
                const brands = [drug["FIRST BRAND"], drug["SECOND BRAND"]]
                  .filter(Boolean)
                  .join(" • ");

                return (
                  <div 
                    key={drug.id || index}
                    onClick={() => setSelectedDrug(drug)}
                    className={`p-4 rounded-xl cursor-pointer transition-all duration-200 border ${
                      selectedDrug && selectedDrug.Active_Content === drug.Active_Content 
                        ? 'bg-blue-50 border-blue-300 ring-1 ring-blue-300 shadow-md' 
                        : 'bg-white border-slate-200 hover:border-blue-400 hover:shadow-sm'
                    }`}
                  >
                    {/* Molecule Name */}
                    <h3 className="font-bold text-base text-slate-900 leading-snug break-words">
                      {drug.Active_Content}
                    </h3>
                    
                    {/* Brand Names (Only shows up if brands exist in the data) */}
                    {brands && (
                      <p className="text-xs font-bold text-blue-600 mt-1.5 truncate">
                        Brands: <span className="font-medium text-blue-800">{brands}</span>
                      </p>
                    )}
                    
                    {/* Category */}
                    <p className="text-xs text-slate-500 mt-1 font-medium truncate">
                      {drug.Category || 'Uncategorized'}
                    </p>
                  </div>
                );
              })}
              
            </div>
          </section>

          {/* RIGHT PANE: Detailed Dashboard */}
          <main className="flex-1 bg-slate-50 overflow-y-auto relative">
            {selectedDrug ? (
              <div className="max-w-5xl mx-auto p-6 md:p-10 lg:p-14">
                
                {/* Header Section */}
                <div className="mb-10 bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                  <span className="inline-block mb-3 px-3.5 py-1.5 bg-slate-100 text-slate-700 border border-slate-200 rounded-lg text-sm font-bold tracking-wide uppercase">
                    {selectedDrug.Category || 'General Category'}
                  </span>
                  <h1 className="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight leading-tight break-words">
                    {selectedDrug.Active_Content}
                  </h1>
                </div>

                {/* Safety Profile Grid */}
                <div className="mb-10">
                  <h2 className="text-xl font-bold text-slate-900 mb-5 flex items-center">
                    <svg className="w-6 h-6 mr-2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    Safety Profile
                  </h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    
                    <div className={`p-5 rounded-2xl border ${getBadgeColors(selectedDrug.Renal_Class)}`}>
                      <p className="text-sm font-bold uppercase tracking-wider opacity-75 mb-1">Renal</p>
                      <p className="text-xl font-extrabold">{selectedDrug.Renal_Class || "N/A"}</p>
                      <p className="text-sm mt-3 opacity-90 leading-relaxed break-words">{selectedDrug.Renal_Note || "No notes available."}</p>
                    </div>
                    
                    <div className={`p-5 rounded-2xl border ${getBadgeColors(selectedDrug.Hepatic_Class)}`}>
                      <p className="text-sm font-bold uppercase tracking-wider opacity-75 mb-1">Hepatic</p>
                      <p className="text-xl font-extrabold">{selectedDrug.Hepatic_Class || "N/A"}</p>
                      <p className="text-sm mt-3 opacity-90 leading-relaxed break-words">{selectedDrug.Hepatic_Note || "No notes available."}</p>
                    </div>
                    
                    <div className={`p-5 rounded-2xl border ${getBadgeColors(selectedDrug.Pregnancy_Class)}`}>
                      <p className="text-sm font-bold uppercase tracking-wider opacity-75 mb-1">Pregnancy</p>
                      <p className="text-xl font-extrabold">{selectedDrug.Pregnancy_Class || "N/A"}</p>
                      <p className="text-sm mt-3 opacity-90 leading-relaxed break-words">{selectedDrug.Pregnancy_Note || "No notes available."}</p>
                    </div>
                    
                    <div className={`p-5 rounded-2xl border ${getBadgeColors(selectedDrug.Lactation_Class)}`}>
                      <p className="text-sm font-bold uppercase tracking-wider opacity-75 mb-1">Lactation</p>
                      <p className="text-xl font-extrabold">{selectedDrug.Lactation_Class || "N/A"}</p>
                      <p className="text-sm mt-3 opacity-90 leading-relaxed break-words">{selectedDrug.Lactation_Note || "No notes available."}</p>
                    </div>

                  </div>
                </div>

                {/* Dosing Information */}
                <div className="mb-10 bg-blue-50 p-8 rounded-2xl border border-blue-100 shadow-sm">
                  <h2 className="text-xl font-bold text-blue-950 mb-3 flex items-center">
                    <svg className="w-6 h-6 mr-2 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Maximum Adult Dosing
                  </h2>
                  <p className="text-lg text-blue-900 font-semibold break-words">{selectedDrug.Max_Dose_Adult || "Not specified."}</p>
                  {selectedDrug.Max_Dose_Notes && (
                    <p className="text-base text-blue-700 mt-3 border-t border-blue-200 pt-3 break-words">{selectedDrug.Max_Dose_Notes}</p>
                  )}
                </div>

                {/* Pricing and Brands Table */}
                <div className="mb-20">
                  <h2 className="text-xl font-bold text-slate-900 mb-5 flex items-center">
                    <svg className="w-6 h-6 mr-2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg>
                    Available Brands & Pricing
                  </h2>
                  <div className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                    <table className="w-full text-left text-base text-slate-700">
                      <thead className="bg-slate-50 border-b border-slate-200">
                        <tr>
                          <th className="p-5 font-bold text-slate-800">Brand Name</th>
                          <th className="p-5 font-bold text-slate-800">Manufacturer</th>
                          <th className="p-5 font-bold text-slate-800 text-right">Price</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {selectedDrug["FIRST BRAND"] ? (
                          <tr className="hover:bg-slate-50 transition-colors">
                            <td className="p-5 font-bold text-slate-900 break-words">{selectedDrug["FIRST BRAND"]}</td>
                            <td className="p-5 break-words">{selectedDrug["FIRST MFG"]}</td>
                            <td className="p-5 text-right font-bold text-emerald-600 whitespace-nowrap">
                              {selectedDrug["FIRST PRICE"] ? `${selectedDrug["FIRST PRICE"]} (INR)` : '-'}
                            </td>
                          </tr>
                        ) : null}
                        {selectedDrug["SECOND BRAND"] ? (
                          <tr className="hover:bg-slate-50 transition-colors">
                            <td className="p-5 font-bold text-slate-900 break-words">{selectedDrug["SECOND BRAND"]}</td>
                            <td className="p-5 break-words">{selectedDrug["SECOND MFG"]}</td>
                            <td className="p-5 text-right font-bold text-emerald-600 whitespace-nowrap">
                              {selectedDrug["SECOND PRICE"] ? `${selectedDrug["SECOND PRICE"]} (INR)` : '-'}
                            </td>
                          </tr>
                        ) : null}
                        {!selectedDrug["FIRST BRAND"] && !selectedDrug["SECOND BRAND"] && (
                            <tr>
                                <td colSpan="3" className="p-8 text-center text-slate-400 italic">No pricing information available for this formulation.</td>
                            </tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>

              </div>
            ) : (
                <div className="flex flex-col h-full items-center justify-center text-slate-400 p-8 text-center">
                    <svg className="w-16 h-16 mb-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                    <p className="text-lg font-medium text-slate-500">Select a drug from the list</p>
                    <p className="text-sm mt-2">Details, safety profiles, and pricing will appear here.</p>
                </div>
            )}
          </main>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DrugDirectory />);
  </script>
</body>
</html>
