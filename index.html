::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; }

/* Skeleton shimmer */
@keyframes shimmer {
  0% { background-position: -600px 0; }
  100% { background-position: 600px 0; }
}
.skeleton {
  background: linear-gradient(90deg, #ebe9e3 25%, #f5f3ee 50%, #ebe9e3 75%);
  background-size: 600px 100%;
  animation: shimmer 1.6s infinite linear;
  border-radius: 8px;
}

/* Keyboard focus ring */
.drug-card:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
.drug-card:focus:not(:focus-visible) { outline: none; }

/* Compare pulse */
@keyframes comparePulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(43,92,230,0.3); }
  50% { box-shadow: 0 0 0 4px rgba(43,92,230,0.1); }
}
.compare-active { animation: comparePulse 2s infinite; }

/* Slide in animation */
@keyframes slideIn {
  from { opacity: 0; transform: translateX(12px); }
  to { opacity: 1; transform: translateX(0); }
}
.slide-in { animation: slideIn 0.22s ease-out forwards; }

/* Fade in */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.25s ease-out forwards; }

/* Tag pill */
.tag { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; border: 1px solid; }

/* Tooltip */
.tooltip-wrap { position: relative; }
.tooltip-wrap:hover .tooltip { opacity: 1; pointer-events: auto; transform: translateY(-2px); }
.tooltip {
  opacity: 0; pointer-events: none; transform: translateY(2px);
  position: absolute; bottom: calc(100% + 6px); left: 50%; translate: -50% 0;
  background: #1a1916; color: #fff; font-size: 11px; font-weight: 500;
  padding: 4px 10px; border-radius: 6px; white-space: nowrap;
  transition: opacity 0.15s, transform 0.15s; z-index: 100;
}

/* Compare drawer */
.compare-drawer { transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.25s; }

/* Modal backdrop */
.modal-backdrop { backdrop-filter: blur(3px); }

/* Filter chip */
.filter-chip {
  cursor: pointer; padding: 5px 14px; border-radius: 999px;
  font-size: 12px; font-weight: 600; border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text-secondary);
  transition: all 0.15s; user-select: none;
}
.filter-chip:hover { border-color: var(--accent); color: var(--accent); }
.filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Recent tag */
.recent-chip {
  cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary);
  transition: all 0.12s;
}
.recent-chip:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

/* Disclaimer */
.disclaimer { background: linear-gradient(135deg, #fefce8, #fef9c3); border: 1px solid #fde047; }

/* Safety legend item */

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── Category SVG Icons ────────────────────────────────────────────────────────
const CategoryIcons = {

  ),
  antibiotic: (c) => (

  ),
  antihypertensive: (c) => (
    <svg viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" className="w-5 h-5">
      <path strokeLinecap="round" strokeLinejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z"/>
    </svg>
  ),
  antidiabetic: (c) => (
    <svg viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" className="w-5 h-5">
      <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 15.75V18m-7.5-6.75h.008v.008H8.25v-.008zm0 2.25h.008v.008H8.25v-.008zm0 2.25h.008v.008H8.25v-.008zm0 2.25h.008v.008H8.25v-.008zm6.75-4.5h.008v.008h-.008v-.008zm0 2.25h.008v.008h-.008v-.008zm0 2.25h.008v.008h-.008v-.008zm2.25-4.5h.008v.008H17.25v-.008zm0 2.25h.008v.008H17.25v-.008zM9 3.75h6M9 3.75A2.25 2.25 0 006.75 6v13.5A2.25 2.25 0 009 21.75h6a2.25 2.25 0 002.25-2.25V6A2.25 2.25 0 0015 3.75M9 3.75h6"/>
    </svg>
  ),
  antifungal: (c) => (
    <svg viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" className="w-5 h-5">
      <path strokeLinecap="round" strokeLinejoin="round" d="M12 6.75a.75.75 0 110-1.5.75.75 0 010 1.5zM12 12.75a.75.75 0 110-1.5.75.75 0 010 1.5zM12 18.75a.75.75 0 110-1.5.75.75 0 010 1.5z M12 3C7.03 3 3 7.03 3 12s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9z"/>
    </svg>
  ),
  antiviral: (c) => (
    <svg viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" className="w-5 h-5">
      <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
  ),
  nsaid: (c) => (
    <svg viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" className="w-5 h-5">
      <path strokeLinecap="round" strokeLinejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z"/>
    </svg>
  ),
  supplement: (c) => (
    <svg viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" className="w-5 h-5">
      <path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/>
    </svg>
  ),
  steroid: (c) => (
    <svg viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.5" className="w-5 h-5">
      <path strokeLinecap="round" strokeLinejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/>
    </svg>
  ),
};

function getCategoryIcon(category, color = "currentColor") {
  if (!category) return CategoryIcons.default(color);
  const cat = category.toLowerCase();
  if (cat.includes('analgesic') || cat.includes('pain')) return CategoryIcons.analgesic(color);
  if (cat.includes('antibiotic') || cat.includes('antimicrobial')) return CategoryIcons.antibiotic(color);
  if (cat.includes('antihypertensive') || cat.includes('cardiac') || cat.includes('cardio') || cat.includes('heart') || cat.includes('blood pressure')) return CategoryIcons.antihypertensive(color);
  if (cat.includes('antidiabetic') || cat.includes('diabetes') || cat.includes('glucose') || cat.includes('insulin')) return CategoryIcons.antidiabetic(color);
  if (cat.includes('antifungal') || cat.includes('fungal')) return CategoryIcons.antifungal(color);
  if (cat.includes('antiviral') || cat.includes('viral')) return CategoryIcons.antiviral(color);
  if (cat.includes('nsaid') || cat.includes('anti-inflammatory')) return CategoryIcons.nsaid(color);
  if (cat.includes('supplement') || cat.includes('vitamin') || cat.includes('mineral')) return CategoryIcons.supplement(color);
  if (cat.includes('steroid') || cat.includes('corticosteroid')) return CategoryIcons.steroid(color);
  return CategoryIcons.default(color);
}

// ─── Safety helpers ─────────────────────────────────────────────────────────
function getSafetyMeta(safetyClass) {
  if (!safetyClass) return { colors: 'bg-gray-50 border-gray-200 text-gray-600', badge: 'bg-gray-100 text-gray-600', dot: '#9ca3af', label: 'Unknown' };
  const sc = safetyClass.toUpperCase().trim();
  if (sc.includes('SAFE') || sc.includes('COMPATIBLE')) return { colors: 'bg-emerald-50 border-emerald-200 text-emerald-800', badge: 'bg-emerald-100 text-emerald-700 border-emerald-200', dot: '#16a34a', label: 'Safe' };
  if (sc.includes('CONTRAINDICATED') || sc.includes('AVOID') || sc.includes('UNSAFE')) return { colors: 'bg-red-50 border-red-200 text-red-800', badge: 'bg-red-100 text-red-700 border-red-200', dot: '#dc2626', label: 'Danger' };
  if (sc.includes('CAUTION') || sc.includes('MONITOR') || sc.includes('ADJUST') || sc.includes('USE WITH')) return { colors: 'bg-amber-50 border-amber-200 text-amber-800', badge: 'bg-amber-100 text-amber-700 border-amber-200', dot: '#d97706', label: 'Caution' };
  return { colors: 'bg-slate-50 border-slate-200 text-slate-700', badge: 'bg-slate-100 text-slate-600 border-slate-200', dot: '#64748b', label: 'N/A' };
}

// ─── Skeleton Card ───────────────────────────────────────────────────────────
function SkeletonCard() {
  return (
    <div className="p-4 rounded-xl border border-slate-200 bg-white space-y-3">
      <div className="skeleton h-4 w-3/4" />
      <div className="skeleton h-3 w-1/2" />
      <div className="skeleton h-3 w-1/3" />
    </div>
  );
}

function SkeletonDetail() {
  return (
    <div className="max-w-5xl mx-auto p-10 space-y-8 fade-in">
      <div className="bg-white p-8 rounded-2xl border border-slate-200 space-y-4">
        <div className="skeleton h-5 w-28" />
        <div className="skeleton h-10 w-2/3" />
      </div>
      <div className="grid grid-cols-4 gap-4">
        {[...Array(4)].map((_,i) => <div key={i} className="skeleton h-36 rounded-2xl" />)}
      </div>
      <div className="skeleton h-28 rounded-2xl" />
      <div className="skeleton h-40 rounded-2xl" />
    </div>
  );
}

// ─── Dose Calculator Modal ───────────────────────────────────────────────────
function DoseCalcModal({ drug, onClose }) {
  const [weight, setWeight] = useState('');
  const [dosePerKg, setDosePerKg] = useState('');
  const [freq, setFreq] = useState('1');

  const result = useMemo(() => {
    const w = parseFloat(weight);
    const d = parseFloat(dosePerKg);
    const f = parseInt(freq);
    if (!w || !d || w <= 0 || d <= 0) return null;
    const single = w * d;
    const daily = single * f;
    return { single: single.toFixed(1), daily: daily.toFixed(1) };
  }, [weight, dosePerKg, freq]);

  useEffect(() => {
    const handleKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [onClose]);

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center modal-backdrop" style={{background:'rgba(26,25,22,0.45)'}} onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 overflow-hidden fade-in" onClick={e => e.stopPropagation()}>
        <div className="p-6 border-b border-slate-100">
          <div className="flex items-center justify-between">
            <div>
              <h3 className="text-lg font-bold text-slate-900">Dose Calculator</h3>
              <p className="text-sm text-slate-500 mt-0.5">{drug.Active_Content}</p>
            </div>
            <button onClick={onClose} className="p-2 rounded-lg hover:bg-slate-100 transition-colors text-slate-500">
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
        </div>
        <div className="p-6 space-y-4">
          <div>
            <label className="block text-sm font-semibold text-slate-700 mb-1.5">Patient Weight (kg)</label>
            <input type="number" value={weight} onChange={e => setWeight(e.target.value)} placeholder="e.g. 70"
              className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-base mono" />
          </div>
          <div>
            <label className="block text-sm font-semibold text-slate-700 mb-1.5">Dose per kg (mg/kg)</label>
            <input type="number" value={dosePerKg} onChange={e => setDosePerKg(e.target.value)} placeholder="e.g. 10"
              className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-base mono" />
          </div>
          <div>
            <label className="block text-sm font-semibold text-slate-700 mb-1.5">Doses per day</label>
            <select value={freq} onChange={e => setFreq(e.target.value)}
              className="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-base bg-white">
              {['1','2','3','4','6','8'].map(v => <option key={v} value={v}>{v}x / day</option>)}
            </select>
          </div>

          {result && (
            <div className="bg-blue-50 border border-blue-100 rounded-xl p-5 space-y-3 fade-in">
              <div className="flex justify-between items-center">
                <span className="text-sm font-semibold text-blue-700">Single dose</span>
                <span className="mono text-xl font-bold text-blue-900">{result.single} <span className="text-sm font-normal">mg</span></span>
              </div>
              <div className="flex justify-between items-center border-t border-blue-200 pt-3">
                <span className="text-sm font-semibold text-blue-700">Daily total</span>
                <span className="mono text-xl font-bold text-blue-900">{result.daily} <span className="text-sm font-normal">mg/day</span></span>
              </div>
              {drug.Max_Dose_Adult && (
                <p className="text-xs text-blue-600 mt-2 pt-2 border-t border-blue-200">
                  ⚠ Reference max dose: <strong>{drug.Max_Dose_Adult}</strong> — verify against clinical guidelines.
                </p>
              )}
            </div>
          )}

          <p className="text-xs text-slate-400 leading-relaxed">
            This calculator provides estimates only. Always verify against current prescribing guidelines and adjust for patient-specific factors.
          </p>
        </div>
      </div>
    </div>
  );
}

// ─── Safety Legend ───────────────────────────────────────────────────────────
function SafetyLegend() {
  const items = [
    { dot: '#16a34a', bg: '#f0fdf4', border: '#bbf7d0', label: 'Safe / Compatible', desc: 'Generally safe to use' },
    { dot: '#d97706', bg: '#fffbeb', border: '#fde68a', label: 'Caution / Monitor', desc: 'Use with monitoring or dose adjustment' },
    { dot: '#dc2626', bg: '#fef2f2', border: '#fecaca', label: 'Contraindicated / Avoid', desc: 'Do not use; significant risk' },
    { dot: '#64748b', bg: '#f8fafc', border: '#e2e8f0', label: 'N/A / Unknown', desc: 'Insufficient data available' },
  ];
  return (
    <div className="bg-white border border-slate-200 rounded-2xl p-5 mb-8">
      <h3 className="text-sm font-bold text-slate-700 uppercase tracking-wider mb-4 flex items-center gap-2">
        <svg className="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Safety Classification Legend
      </h3>
      <div className="grid grid-cols-2 gap-3">
        {items.map(item => (
          <div key={item.label} className="flex items-start gap-3 p-3 rounded-xl border" style={{background: item.bg, borderColor: item.border}}>
            <div className="legend-dot mt-0.5" style={{background: item.dot}} />
            <div>
              <p className="text-xs font-bold" style={{color: item.dot}}>{item.label}</p>
              <p className="text-xs mt-0.5 text-slate-500">{item.desc}</p>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Compare Panel ───────────────────────────────────────────────────────────
function ComparePanel({ drugs, onRemove }) {
  const safetyKeys = [
    { key: 'Renal_Class', note: 'Renal_Note', label: 'Renal' },
    { key: 'Hepatic_Class', note: 'Hepatic_Note', label: 'Hepatic' },
    { key: 'Pregnancy_Class', note: 'Pregnancy_Note', label: 'Pregnancy' },
    { key: 'Lactation_Class', note: 'Lactation_Note', label: 'Lactation' },
  ];

  return (
    <div className="fade-in">
      {/* Compare Header */}
      <div className="sticky top-0 z-10 bg-slate-50 pt-8 pb-4 px-10 border-b border-slate-200">
        <div className="max-w-5xl mx-auto flex items-center gap-4">
          <div className="flex items-center gap-2 text-blue-700 bg-blue-50 border border-blue-200 px-4 py-2 rounded-xl">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/></svg>
            <span className="text-sm font-bold">Comparing {drugs.length} drug{drugs.length > 1 ? 's' : ''}</span>
          </div>
          <p className="text-sm text-slate-500">Select up to 3 drugs from the list to compare side-by-side</p>
        </div>
      </div>

      <div className="max-w-5xl mx-auto px-10 py-8">
        {drugs.length === 0 ? (
          <div className="flex flex-col items-center justify-center py-24 text-slate-400">
            <svg className="w-14 h-14 mb-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/></svg>
            <p className="text-lg font-semibold text-slate-500">No drugs selected for comparison</p>
            <p className="text-sm mt-1">Click the compare icon on drug cards to add them here</p>
          </div>
        ) : (
          <div className="space-y-6">
            {/* Drug headers */}

            {/* Brands row */}

              <div className="w-32 shrink-0 flex items-center">
                <p className="text-xs font-bold text-slate-500 uppercase tracking-wider">Brands</p>
              </div>
              {drugs.map(drug => (
                <div key={drug.Active_Content} className="compare-col bg-white border border-slate-200 rounded-xl p-4">
                  {drug["FIRST BRAND"] && (
                    <div className="flex justify-between text-sm mb-1">
                      <span className="font-semibold">{drug["FIRST BRAND"]}</span>
                      {drug["FIRST PRICE"] && <span className="text-emerald-600 font-bold mono">₹{drug["FIRST PRICE"]}</span>}
                    </div>
                  )}
                  {drug["SECOND BRAND"] && (
                    <div className="flex justify-between text-sm">
                      <span className="font-semibold">{drug["SECOND BRAND"]}</span>
                      {drug["SECOND PRICE"] && <span className="text-emerald-600 font-bold mono">₹{drug["SECOND PRICE"]}</span>}
                    </div>

                  {!drug["FIRST BRAND"] && <p className="text-sm text-slate-400 italic">No brands listed</p>}
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Main App ────────────────────────────────────────────────────────────────
function DrugDirectory() {
  const [searchTerm, setSearchTerm] = useState('');
  const [drugsData, setDrugsData] = useState([]);
  const [selectedDrug, setSelectedDrug] = useState(null);
  const [isLoading, setIsLoading] = useState(false);
  const [recentSearches, setRecentSearches] = useState([]);
  const [compareList, setCompareList] = useState([]);
  const [compareMode, setCompareMode] = useState(false);
  const [showCalc, setShowCalc] = useState(false);
  const [categoryFilter, setCategoryFilter] = useState('');
  const [safetyFilter, setSafetyFilter] = useState('');
  const [showFilters, setShowFilters] = useState(false);
  const [focusedIndex, setFocusedIndex] = useState(-1);
  const listRef = useRef(null);
  const inputRef = useRef(null);
  const cardRefs = useRef([]);

  // Fetch
  useEffect(() => {
    if (searchTerm.trim().length < 2) { setDrugsData([]); setIsLoading(false); return; }
    setIsLoading(true);
    const t = setTimeout(() => {
      fetch(`https://drugs.drmjp93.workers.dev?q=${encodeURIComponent(searchTerm)}`)
        .then(r => r.json())
        .then(data => {
          const arr = Array.isArray(data) ? data : [];
          setDrugsData(arr);
          if (arr.length > 0 && !selectedDrug) setSelectedDrug(arr[0]);
          setIsLoading(false);
          // Save recent
          if (searchTerm.trim().length >= 2) {
            setRecentSearches(prev => {
              const filtered = prev.filter(s => s !== searchTerm.trim());
              return [searchTerm.trim(), ...filtered].slice(0, 6);
            });
          }
        })
        .catch(() => setIsLoading(false));
    }, 300);
    return () => clearTimeout(t);
  }, [searchTerm]);

  // Filtered drugs
  const filteredDrugs = useMemo(() => {
    return drugsData.filter(drug => {
      if (categoryFilter && drug.Category !== categoryFilter) return false;
      if (safetyFilter) {
        const sc = [drug.Renal_Class, drug.Hepatic_Class, drug.Pregnancy_Class, drug.Lactation_Class];
        const match = sc.some(c => {
          if (!c) return false;
          const cu = c.toUpperCase();
          if (safetyFilter === 'safe') return cu.includes('SAFE') || cu.includes('COMPATIBLE');
          if (safetyFilter === 'caution') return cu.includes('CAUTION') || cu.includes('MONITOR') || cu.includes('ADJUST');
          if (safetyFilter === 'danger') return cu.includes('CONTRAINDICATED') || cu.includes('AVOID') || cu.includes('UNSAFE');
          return false;
        });
        if (!match) return false;
      }
      return true;
    });
  }, [drugsData, categoryFilter, safetyFilter]);

  // Categories from results
  const categories = useMemo(() => {
    const cats = [...new Set(drugsData.map(d => d.Category).filter(Boolean))];
    return cats.sort();
  }, [drugsData]);

  // Keyboard navigation
  useEffect(() => {
    const handleKey = (e) => {
      if (document.activeElement === inputRef.current || e.target.closest('input, select, button')) {
        if (e.key === 'ArrowDown' && document.activeElement === inputRef.current) {
          e.preventDefault();
          setFocusedIndex(0);
          cardRefs.current[0]?.focus();
        }
        return;
      }
      if (e.key === '/' || e.key === 'f') { e.preventDefault(); inputRef.current?.focus(); }
    };
    const handleCardKey = (e, idx) => {
      if (e.key === 'ArrowDown') { e.preventDefault(); const next = idx + 1; if (cardRefs.current[next]) { setFocusedIndex(next); cardRefs.current[next].focus(); } }
      if (e.key === 'ArrowUp') { e.preventDefault(); if (idx === 0) { inputRef.current?.focus(); setFocusedIndex(-1); } else { const prev = idx - 1; setFocusedIndex(prev); cardRefs.current[prev]?.focus(); } }
      if (e.key === 'Enter') { setSelectedDrug(filteredDrugs[idx]); }
      if (e.key === 'c' || e.key === 'C') { toggleCompare(filteredDrugs[idx]); }
    };
    window.addEventListener('keydown', handleKey);
    // Attach per-card handlers via refs dynamically — handled in JSX
    return () => window.removeEventListener('keydown', handleKey);
  }, [filteredDrugs]);

  const toggleCompare = (drug) => {
    setCompareList(prev => {
      const exists = prev.find(d => d.Active_Content === drug.Active_Content);
      if (exists) return prev.filter(d => d.Active_Content !== drug.Active_Content);
      if (prev.length >= 3) return prev; // max 3
      return [...prev, drug];
    });
  };

  const inCompare = (drug) => compareList.some(d => d.Active_Content === drug.Active_Content);

  const clearSearch = () => { setSearchTerm(''); setDrugsData([]); setSelectedDrug(null); setCategoryFilter(''); setSafetyFilter(''); inputRef.current?.focus(); };

  return (
    <div className="flex flex-col h-screen w-full overflow-hidden" style={{background:'var(--bg)'}}>
      
      {/* ── Disclaimer Banner ── */}
      <div className="disclaimer flex items-center justify-center gap-3 px-6 py-2 text-xs font-medium text-yellow-900 shrink-0 border-b border-yellow-300">
        <svg className="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        <span><strong>Clinical Reference Only.</strong> This tool is intended for qualified healthcare professionals. Always verify drug information against current prescribing guidelines and clinical judgment. Not a substitute for professional medical advice.</span>
      </div>

      <div className="flex flex-1 overflow-hidden">
        {/* ── LEFT PANE ── */}
        <section className="w-[420px] shrink-0 bg-white border-r flex flex-col" style={{borderColor:'var(--border)'}}>
          
          {/* Search Header */}
          <div className="px-5 pt-5 pb-4 border-b shrink-0" style={{borderColor:'var(--border)'}}>
            <div className="flex items-center justify-between mb-4">
              <h2 className="text-lg font-extrabold tracking-tight" style={{color:'var(--text-primary)'}}>
                Rx <span className="serif italic" style={{color:'var(--accent)'}}>Directory</span>
              </h2>
              <div className="flex items-center gap-1.5">
                {/* Compare toggle */}
                <div className="tooltip-wrap">
                  <button onClick={() => setCompareMode(m => !m)}
                    className={`p-2 rounded-lg transition-colors text-sm font-bold ${compareMode ? 'bg-blue-600 text-white' : 'hover:bg-slate-100 text-slate-500'}`}>
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/></svg>
                  </button>
                  <span className="tooltip">{compareMode ? 'Exit compare' : 'Compare mode'}</span>
                </div>
                {/* Filter toggle */}
                <div className="tooltip-wrap">
                  <button onClick={() => setShowFilters(f => !f)}
                    className={`p-2 rounded-lg transition-colors ${showFilters ? 'bg-slate-100 text-slate-700' : 'hover:bg-slate-100 text-slate-500'}`}>
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
                  </button>
                  <span className="tooltip">Filters</span>
                </div>
              </div>
            </div>

            {/* Search Input */}
            <div className="relative">
              <input
                ref={inputRef}
                type="text"
                placeholder="Search drug, brand, category…"
                className="w-full py-3 pl-10 pr-9 text-sm border rounded-xl outline-none transition-all"
                style={{borderColor: searchTerm ? 'var(--accent)' : 'var(--border)', boxShadow: searchTerm ? '0 0 0 3px #eef1fd' : 'none'}}
                value={searchTerm}
                onChange={e => { setSearchTerm(e.target.value); setFocusedIndex(-1); }}
                onKeyDown={e => {
                  if (e.key === 'ArrowDown' && filteredDrugs.length > 0) {
                    e.preventDefault(); setFocusedIndex(0); cardRefs.current[0]?.focus();
                  }
                }}
              />
              <svg className="w-4 h-4 absolute left-3.5 top-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              {searchTerm && (
                <button onClick={clearSearch} className="absolute right-3 top-3 p-0.5 rounded-full hover:bg-slate-200 text-slate-400 transition-colors">
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
              )}
            </div>

            {/* Filters */}
            {showFilters && drugsData.length > 0 && (
              <div className="mt-3 space-y-2 fade-in">
                {categories.length > 0 && (
                  <div>
                    <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Category</p>
                    <div className="flex flex-wrap gap-1.5">
                      <span className={`filter-chip ${categoryFilter === '' ? 'active' : ''}`} onClick={() => setCategoryFilter('')}>All</span>
                      {categories.map(cat => (
                        <span key={cat} className={`filter-chip ${categoryFilter === cat ? 'active' : ''}`} onClick={() => setCategoryFilter(c => c === cat ? '' : cat)}>{cat}</span>
                      ))}
                    </div>
                  </div>
                )}
                <div>
                  <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Safety Class</p>
                  <div className="flex flex-wrap gap-1.5">
                    {[['', 'All'], ['safe', 'Safe'], ['caution', 'Caution'], ['danger', 'Danger']].map(([val, label]) => (
                      <span key={val} className={`filter-chip ${safetyFilter === val ? 'active' : ''}`} onClick={() => setSafetyFilter(s => s === val ? '' : val)}>{label}</span>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* Keyboard hint */}
            <p className="text-xs mt-2 px-0.5" style={{color:'var(--text-muted)'}}>
              <kbd className="mono px-1 py-0.5 bg-slate-100 rounded text-xs border border-slate-200">↑↓</kbd> navigate &nbsp;
              <kbd className="mono px-1 py-0.5 bg-slate-100 rounded text-xs border border-slate-200">Enter</kbd> select &nbsp;
              <kbd className="mono px-1 py-0.5 bg-slate-100 rounded text-xs border border-slate-200">/</kbd> search
            </p>
          </div>

          {/* Compare badge */}
          {compareMode && (
            <div className="px-5 py-2 border-b bg-blue-50 flex items-center justify-between shrink-0" style={{borderColor:'#bfdbfe'}}>
              <p className="text-xs font-bold text-blue-700">{compareList.length}/3 drugs selected</p>
              {compareList.length > 0 && (
                <button onClick={() => setCompareList([])} className="text-xs text-blue-500 hover:text-blue-700 font-semibold">Clear</button>
              )}
            </div>
          )}

          {/* List */}
          <div ref={listRef} className="flex-1 overflow-y-auto px-4 py-4 space-y-2">
            {isLoading && [...Array(5)].map((_, i) => <SkeletonCard key={i} />)}

            {!isLoading && searchTerm.length < 2 && (
              <div className="py-10 px-2">
                <div className="flex flex-col items-center mb-8 text-center">
                  <div className="w-14 h-14 rounded-2xl flex items-center justify-center mb-3" style={{background:'#eef1fd'}}>
                    <svg className="w-7 h-7 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
                  </div>
                  <h3 className="text-sm font-bold text-slate-700">Search the drug database</h3>
                  <p className="text-xs text-slate-500 mt-1">Type at least 2 characters to begin</p>
                </div>
                {recentSearches.length > 0 && (
                  <div>
                    <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2.5">Recent searches</p>
                    <div className="flex flex-wrap gap-2">
                      {recentSearches.map(term => (
                        <button key={term} className="recent-chip" onClick={() => setSearchTerm(term)}>
                          <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                          {term}
                        </button>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {!isLoading && searchTerm.length >= 2 && filteredDrugs.length === 0 && (
              <div className="text-center py-16 px-4">
                <p className="text-sm font-semibold text-slate-600">No results for "{searchTerm}"</p>
                <p className="text-xs text-slate-400 mt-1">Try a broader search or different spelling</p>
                {(categoryFilter || safetyFilter) && (
                  <button onClick={() => { setCategoryFilter(''); setSafetyFilter(''); }} className="mt-3 text-xs text-blue-600 font-semibold hover:underline">Clear filters</button>
                )}
              </div>
            )}

            {!isLoading && filteredDrugs.map((drug, index) => {
              const brands = [drug["FIRST BRAND"], drug["SECOND BRAND"]].filter(Boolean).join(" · ");
              const isSelected = selectedDrug?.Active_Content === drug.Active_Content;
              const isInCompare = inCompare(drug);

              return (
                <div
                  key={drug.id || index}
                  ref={el => cardRefs.current[index] = el}
                  tabIndex={0}
                  className={`drug-card p-4 rounded-xl cursor-pointer transition-all duration-150 border group relative ${
                    isSelected ? 'bg-blue-50 border-blue-300 shadow-sm' : 'bg-white border-slate-200 hover:border-blue-300 hover:shadow-sm'
                  } ${isInCompare ? 'compare-active ring-2 ring-blue-400 ring-offset-1' : ''}`}
                  onClick={() => { setSelectedDrug(drug); if (!compareMode) return; }}
                  onKeyDown={e => {
                    if (e.key === 'ArrowDown') { e.preventDefault(); const next = index + 1; if (cardRefs.current[next]) { setFocusedIndex(next); cardRefs.current[next].focus(); } }
                    if (e.key === 'ArrowUp') { e.preventDefault(); if (index === 0) { inputRef.current?.focus(); setFocusedIndex(-1); } else { const prev = index - 1; setFocusedIndex(prev); cardRefs.current[prev]?.focus(); } }
                    if (e.key === 'Enter') setSelectedDrug(drug);
                  }}
                >
                  <div className="flex items-start gap-3">
                    <div className={`mt-0.5 w-8 h-8 rounded-lg flex items-center justify-center shrink-0 transition-colors ${isSelected ? 'bg-blue-100' : 'bg-slate-50 group-hover:bg-blue-50'}`}>
                      {getCategoryIcon(drug.Category, isSelected ? '#2b5ce6' : '#94a3b8')}
                    </div>
                    <div className="flex-1 min-w-0">
                      <h3 className="font-bold text-sm leading-snug break-words text-slate-900">{drug.Active_Content}</h3>
                      {brands && <p className="text-xs text-blue-600 font-semibold mt-1 truncate">{brands}</p>}
                      <p className="text-xs text-slate-400 mt-0.5 truncate">{drug.Category || 'Uncategorized'}</p>
                    </div>
                    {compareMode && (
                      <button
                        onClick={e => { e.stopPropagation(); toggleCompare(drug); }}
                        className={`shrink-0 p-1.5 rounded-lg transition-colors ${isInCompare ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-400 hover:bg-blue-100 hover:text-blue-600'}`}
                      >
                        <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"/></svg>
                      </button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Result count */}
          {!isLoading && filteredDrugs.length > 0 && (
            <div className="px-5 py-2.5 border-t text-xs font-medium text-slate-400 shrink-0" style={{borderColor:'var(--border)'}}>
              {filteredDrugs.length} result{filteredDrugs.length !== 1 ? 's' : ''}
              {(categoryFilter || safetyFilter) && <span className="text-blue-500"> (filtered)</span>}
            </div>
          )}
        </section>

        {/* ── RIGHT PANE ── */}
        <main className="flex-1 overflow-y-auto relative bg-slate-50">
          {compareMode ? (
            <ComparePanel drugs={compareList} onRemove={(name) => setCompareList(prev => prev.filter(d => d.Active_Content !== name))} />
          ) : selectedDrug ? (
            <DrugDetail key={selectedDrug.Active_Content} drug={selectedDrug} onCalc={() => setShowCalc(true)} />
          ) : isLoading ? (
            <SkeletonDetail />
          ) : (
            <div className="flex flex-col h-full items-center justify-center text-slate-400 p-8 text-center">
              <div className="w-20 h-20 rounded-2xl flex items-center justify-center mb-4" style={{background:'#eef1fd'}}>
                <svg className="w-10 h-10 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
              </div>
              <p className="text-lg font-bold text-slate-500">Select a drug to view details</p>
              <p className="text-sm mt-1 text-slate-400">Safety profiles, dosing information, and brand pricing will appear here.</p>
            </div>
          )}
        </main>
      </div>

      {/* ── Dose Calc Modal ── */}
      {showCalc && selectedDrug && <DoseCalcModal drug={selectedDrug} onClose={() => setShowCalc(false)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<DrugDirectory />);
</script>

</body>
</html>
